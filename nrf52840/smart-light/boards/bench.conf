# Bench mode — RTT logging, no UART, no USB
CONFIG_UART_CONSOLE=n
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
# WDT cannot be disabled on nRF52840 — wdt_nrf_disable() returns -EPERM
# because NRFX_WDT_HAS_STOP is not defined for this chip. The line below
# is a no-op but kept for documentation. trinity_wdt_init() feeds channel 0
# in bench mode so the bootloader-armed WDT does not fire.
CONFIG_WDT_DISABLE_AT_BOOT=y
CONFIG_WATCHDOG=y
