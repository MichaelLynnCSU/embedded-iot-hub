# /******************************************************************************
# * \file prj.conf
# * \author MichaelLynnCSU (https://github.com/MichaelLynnCSU)
# * \date    01-01-2025
# *
# * \brief   Zephyr project configuration for nRF52840 reed sensor node.
# *
# * \details Enables GPIO, ADC, UART console, deferred logging, BLE
# *          broadcaster/observer, flash storage, UF2 build output,
# *          stack sentinel, and heap checking for trinity fault coverage.
# *
# *          Trinity build mode is selected at west build time:
# *            BENCH: west build -- -DCONFIG_TRINITY_MODE_BENCH=y
# *            FIELD: west build (default — no extra flag needed)
# ******************************************************************************/

# ========================= CORE PERIPHERALS ==================================
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PRINTK=y

# ========================= CONSOLE / UART ====================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ========================= LOGGING ===========================================
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_BT_LOG_LEVEL_OFF=y

# ========================= BLUETOOTH =========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_BT_DEVICE_NAME="ReedSensor"

# ========================= FLASH STORAGE =====================================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_STREAM_FLASH=y

# ========================= BUILD OUTPUT ======================================
CONFIG_BUILD_OUTPUT_UF2=y

# ========================= PERSISTENT SETTINGS ===============================
CONFIG_BT_SETTINGS=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ========================= FAULT COVERAGE ====================================
CONFIG_REBOOT=y
CONFIG_FAULT_DUMP=2
CONFIG_FRAME_POINTER=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y
CONFIG_INIT_STACKS=y

# ========================= RADIO / FLASH SYNC ================================
CONFIG_SOC_FLASH_NRF_RADIO_SYNC_TICKER=y

# ========================= TRINITY WATCHDOG ==================================
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# ========================= TRINITY HEAP STATS ================================
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y

# ========================= TRINITY THREAD STATS ==============================
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_RUNTIME_STATS=y

# ========================= STACK SIZES =======================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=4096
CONFIG_BOOT_DELAY=2000
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# ========================= I2C / FUEL GAUGE ==================================
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_FUEL_GAUGE=y
CONFIG_MAX17048=n
CONFIG_MAX17048=n
