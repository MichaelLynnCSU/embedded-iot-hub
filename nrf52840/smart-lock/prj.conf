# ========================= CORE ==============================================
CONFIG_TRINITY_CHIP_NRF52840=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_BUILD_OUTPUT_UF2=y

# ========================= HARDWARE ==========================================
CONFIG_ADC=y
CONFIG_PWM=y

# ========================= FLASH / NVS =======================================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_STREAM_FLASH=y
CONFIG_SOC_FLASH_NRF_PARTIAL_ERASE=y
CONFIG_SOC_FLASH_NRF_RADIO_SYNC_TICKER=y

# ========================= BLUETOOTH =========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SmartLock"
CONFIG_BT_GATT_SERVICE_CHANGED=y
CONFIG_BT_LOG_LEVEL_OFF=y

# ========================= STACK SIZES =======================================
CONFIG_ISR_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024

# ========================= FAULT COVERAGE ====================================
CONFIG_HW_STACK_PROTECTION=y
CONFIG_FAULT_DUMP=2
CONFIG_FRAME_POINTER=y
CONFIG_REBOOT=y

# ========================= LOGGING ===========================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=16384

# ========================= THREAD VISIBILITY =================================
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# ========================= TRINITY WATCHDOG ==================================
CONFIG_WATCHDOG=y

# ========================= TRINITY HEAP STATS ================================
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# ========================= TRINITY THREAD STATS ==============================
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_RUNTIME_STATS=y
