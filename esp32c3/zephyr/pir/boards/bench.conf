# Bench mode — USB-JTAG console, no deep sleep
#
# NOTE: USB console is incompatible with deep sleep. The USB peripheral
#       loses power during sleep and the connection drops every cycle.
#       Deep sleep is disabled here by design -- use the field build
#       (west build without EXTRA_CONF_FILE) for power profiling.
#       Do not enable CONFIG_PM or call esp_deep_sleep_start() in bench mode.
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_PM=n
