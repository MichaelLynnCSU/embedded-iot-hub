CONFIG_TRINITY_CHIP_ESP32C3=y
# Console and Logging
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
# GPIO
CONFIG_GPIO=y
# I2C
CONFIG_I2C=y
# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="PIR_Motion"
CONFIG_BT_SMP=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
# Flash storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y
# ========================= POWER MANAGEMENT ==================================
# Deep sleep is implemented via ESP-IDF API (esp_deep_sleep_start) directly.
# Zephyr CONFIG_PM does NOT reach true deep sleep on ESP32-C3 and adds
# overhead without benefit -- do not enable it.
# USB console is incompatible with deep sleep -- field build uses UART only.
# Bench build disables deep sleep via bench.conf.
#
# NOTE: CONFIG_PM=y is required for CONFIG_POWEROFF=y to compile -- the
# Zephyr build system gates POWEROFF behind PM. CONFIG_PM itself does not
# activate Zephyr power management on ESP32-C3; esp_deep_sleep_start() is
# called directly via ESP-IDF and bypasses the Zephyr PM layer entirely.
# Effectively CONFIG_PM=y here is a build dependency, not a behavioral one.
#
# NOTE: CONFIG_POWEROFF=y was found required via grep during NVS integration
# work (2026-05-03). esp_deep_sleep_start() pulls in poweroff symbols at
# link time on this Zephyr/ESP32-C3 toolchain version. Without it the build
# fails with undefined reference errors. Not a runtime dependency -- purely
# a linker requirement for the ESP-IDF deep sleep path under Zephyr.
CONFIG_PM=y
CONFIG_POWEROFF=y
# ========================= TRINITY FAULT COVERAGE ============================
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y
# ========================= TRINITY WATCHDOG ==================================
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n
# ========================= TRINITY HEAP STATS ================================
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_HEAP_MEM_POOL_SIZE=32768
# ========================= TRINITY THREAD STATS ==============================
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_RUNTIME_STATS=y
# ========================= STACK SIZES =======================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
# ========================= NVS ===============================================
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
