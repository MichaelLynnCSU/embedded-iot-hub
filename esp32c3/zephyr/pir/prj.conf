CONFIG_TRINITY_CHIP_ESP32C3=y

# Console and Logging
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3

# GPIO
CONFIG_GPIO=y

# I2C
CONFIG_I2C=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="PIR_Motion"
CONFIG_BT_SMP=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=n
CONFIG_BT_GATT_SERVICE_CHANGED=n

# Flash storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y

# ========================= TRINITY FAULT COVERAGE ============================
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# ========================= TRINITY WATCHDOG ==================================
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# ========================= TRINITY HEAP STATS ================================
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

# ========================= TRINITY THREAD STATS ==============================
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_RUNTIME_STATS=y

# ========================= STACK SIZES =======================================
# Raised from defaults -- sched-lock violation fix requires sysworkq headroom.
# Confirmed sysworkq watermark at ~2048 bytes on nRF52840 siblings under
# thread_analyzer_run(); ESP32-C3 RISC-V call frames are similar depth.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_MAIN_STACK_SIZE=2048
